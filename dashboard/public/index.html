<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrase Review</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/table.css">
    <link rel="stylesheet" href="styles/chat.css">
    <link rel="stylesheet" href="styles/modal.css">
    <link rel="stylesheet" href="styles/tags.css">
</head>
<body>

<header>
    <h1>Phrase Review</h1>
    <div class="header-buttons">
        <button onclick="resetSession()">New session</button>
        <button class="primary" onclick="openPromptModal('Review Prompt', '/system-prompt')">Review prompt</button>
        <button class="primary" onclick="openPromptModal('Bot Prompt', '/bot-prompt')">Bot prompt</button>
    </div>
</header>

<div id="table-area">
    <!-- TAG SIDEBAR -->
    <div id="tag-sidebar">
        <div id="sidebar-header">
            <span>Tags</span>
        </div>
        <div id="tag-list"></div>
        <button onclick="showAddMainTag()">+ main tag</button>
        <div id="tag-form"></div>
    </div>

    <!-- PHRASE TABLE -->
    <div id="table-section">
        <div id="table-toolbar">
            <span>Filter:</span>
            <button class="active" onclick="filterTable('all', this)">All</button>
            <button onclick="filterTable('uncategorized', this)">Uncategorized</button>
            <button onclick="filterTable('approved', this)">Approved</button>
        </div>
        <div id="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Hebrew</th>
                        <th>Variant 1</th>
                        <th>Variant 2</th>
                        <th>Tag</th>
                        <th>Status</th>
                        <th class="sortable" onclick="toggleSort()">Date ↓</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- CHAT -->
<div id="chat-section">
    <div id="chat"></div>
    <div id="input-area">
        <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
        <button class="primary" id="send" onclick="sendMessage()">Send</button>
    </div>
</div>


<!-- SHARED PROMPT MODAL -->
<div id="prompt-modal-overlay" style="display:none">
    <div id="modal">
        <div id="modal-header">
            <span id="modal-title"></span>
            <button onclick="closePromptModal()">✕</button>
        </div>
        <textarea id="prompt-editor"></textarea>
        <div id="modal-footer">
            <button onclick="closePromptModal()">Cancel</button>
            <button class="primary" onclick="savePrompt()">Save & Commit</button>
        </div>
    </div>
</div>


<!-- SYSTEM PROMPT MODAL -->
<div id="system-modal-overlay" style="display:none">
    <div id="modal">
        <div id="modal-header">
            <span>System Prompt</span>
            <button onclick="closeSystemModal()">✕</button>
        </div>
        <textarea id="system-prompt-editor"></textarea>
        <div id="modal-footer">
            <button onclick="closeSystemModal()">Cancel</button>
            <button class="primary" onclick="saveSystemPrompt()">Save & Commit</button>
        </div>
    </div>
</div>

<!-- BOT PROMPT MODAL -->
<div id="bot-modal-overlay" style="display:none">
    <div id="modal">
        <div id="modal-header">
            <span>Bot Prompt</span>
            <button onclick="closeBotModal()">✕</button>
        </div>
        <textarea id="bot-prompt-editor"></textarea>
        <div id="modal-footer">
            <button onclick="closeBotModal()">Cancel</button>
            <button class="primary" onclick="saveBotPrompt()">Save & Commit</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="tagsState.js"></script>
<script src="tagsSidebar.js"></script>
<script src="tagsMerge.js"></script>
<script src="app.js"></script>

</body>
</html>
